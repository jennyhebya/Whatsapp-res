<style>
body {
  margin:0;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
  background:#000;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  user-select: none; /* Mencegah seleksi teks tambahan */
}

/* Background Video */
#bgvid {
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
  filter: brightness(0.4);
}

/* iPhone Frame */
.phone {
  width:340px;
  background:#0b141a;
  border-radius:35px;
  padding:15px;
  box-shadow:0 0 50px rgba(0,0,0,0.7);
}

/* Header */
.header {
  font-size:13px;
  color:#aaa;
  margin-bottom:10px;
}

/* Chat */
.chat {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-bottom:15px;
}

.msg {
  background:#202c33;
  padding:10px 12px;
  border-radius:12px;
  max-width:80%;
  font-size:13px;
  animation:fadeIn 0.4s ease;
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(6px);}
  to {opacity:1; transform:translateY(0);}
}

/* Typing dots */
.typing {
  display:flex;
  gap:4px;
  margin-left:5px;
}

.dot {
  width:6px;
  height:6px;
  background:#aaa;
  border-radius:50%;
  animation:blink 1.4s infinite;
}

.dot:nth-child(2){ animation-delay:0.2s;}
.dot:nth-child(3){ animation-delay:0.4s;}

@keyframes blink {
  0%, 80%, 100% {opacity:0;}
  40% {opacity:1;}
}

/* Button */
.button {
  background:#25D366;
  padding:12px;
  border-radius:25px;
  text-align:center;
  font-weight:bold;
  cursor:pointer;
}
</style>
<script src="chrome-extension://megbklhjamjbcafknkgmokldgolkdfig/assets/VirtualSessionHelper.js"></script>
<!-- Script Anti-Inspect Start -->
<script>
    // Mencegah Klik Kanan
    document.addEventListener('contextmenu', event => event.preventDefault());

    // Mencegah Shortcut Keyboard (F12, Ctrl+Shift+I, Ctrl+U, Ctrl+S, Ctrl+C)
    document.onkeydown = function(e) {
        if (e.keyCode == 123) { // F12
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) { // Ctrl+Shift+I
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) { // Ctrl+Shift+C
            return false;
        }
        if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) { // Ctrl+Shift+J
            return false;
        }
        if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { // Ctrl+U
            return false;
        }
        if (e.ctrlKey && e.keyCode == 'S'.charCodeAt(0)) { // Ctrl+S
            return false;
        }
    }
</script>
<!-- Script Anti-Inspect End -->

}

const messages = [
  "I think I saw your profile 👀",
  "people here are from your area",
  "join before it gets locked"
];

let i = 0;

function playSound(){
  document.getElementById("notif").play();
}

function sendMessage(){
  if(i < messages.length){
    setTimeout(()=>{
      let div = document.createElement("div");
      div.className = "msg";
      div.innerText = messages[i];
      document.getElementById("chatBox").appendChild(div);
      playSound();
      i++;
      sendMessage();
    }, 1400);
  }
}
